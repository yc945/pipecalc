name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            openjdk-17-jdk \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev cmake

      - name: Install Python build tools
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer android debug 2>&1 | grep -E "license|License|Accept|accept" | head -5 || true
          find ~/.buildozer -name "sdkmanager" 2>/dev/null | head -1 | xargs -I{} sh -c 'yes | {} --licenses' 2>/dev/null || true

      - name: Build APK
        run: buildozer android debug 2>&1 | tail -200

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipecalc-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "供水水力计算 v${{ github.run_number }}"
          files: bin/*.apk
          body: |
            农村安全供水管道水力计算 Android 应用
            参照 GB 50013-2018 | SL 310-2019
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
